name: Conformance Soak

# Two independent jobs:
#
#   host-conformance — the actual regression gate. Runs the FULL
#     conformance suite under strict mode against the SQLite reference
#     host. Multi-process scenarios (restart-during-run + staleClaim).
#     Three-language SDK smoke. **No external network dependencies** —
#     if `packs.openwop.dev` is down, this job still passes or fails on
#     host-only grounds, which is what a regression gate should do.
#
#   registry-health — separate concern: the hosted node-pack registry at
#     `packs.openwop.dev` is reachable and serves the documented shapes.
#     A registry outage fails THIS job in isolation; the host-conformance
#     job remains a clean signal about the SQLite host.
#
# Both jobs run on the nightly cron + on push to main + on
# workflow_dispatch. They don't depend on each other.

on:
  schedule:
    # 06:00 UTC nightly (off the European/US business-hours peaks).
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'examples/hosts/sqlite/**'
      - 'conformance/**'
      - '.github/workflows/conformance-soak.yml'

jobs:
  host-conformance:
    name: SQLite host — full conformance + multi-process + SDK smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            examples/hosts/sqlite/package-lock.json
            conformance/package-lock.json
            sdk/typescript/package-lock.json

      - name: Install SQLite reference host
        working-directory: examples/hosts/sqlite
        run: npm ci

      - name: Install conformance suite
        working-directory: conformance
        run: npm ci

      # Several spec-corpus scenarios assert against `sdk/typescript/dist/`
      # (e.g., `SDK HTTP error helpers match canonical REST vocabulary`'s
      # three "TypeScript dist …" sub-cases). The local `npm run
      # openwop:check` gate builds the SDK in its step [1/9] before
      # invoking conformance; the soak workflow has to mirror that order
      # or the dist-reading scenarios fail with "ENOENT: no such file".
      - name: Build TypeScript reference SDK (emit dist/)
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build

      - name: Pre-allocate ports for host + OTel collector
        run: |
          echo "OPENWOP_PORT=3838" >> $GITHUB_ENV
          echo "OPENWOP_OTEL_COLLECTOR_PORT=14328" >> $GITHUB_ENV

      - name: Boot SQLite host (background)
        working-directory: examples/hosts/sqlite
        env:
          OPENWOP_PORT: ${{ env.OPENWOP_PORT }}
          OPENWOP_WEBHOOK_ALLOW_PRIVATE: 'true'
          OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:${{ env.OPENWOP_OTEL_COLLECTOR_PORT }}
          OPENWOP_OTEL_METRIC_INTERVAL_MS: '500'
          OPENWOP_CLAIM_TTL_MS: '2000'
          OPENWOP_HEARTBEAT_INTERVAL_MS: '500'
        run: |
          rm -rf data
          nohup npx tsx src/server.ts > /tmp/host.log 2>&1 &
          echo $! > /tmp/host.pid
          for i in {1..30}; do
            if curl -sf "http://127.0.0.1:${OPENWOP_PORT}/.well-known/openwop" > /dev/null; then
              echo "host ready"
              exit 0
            fi
            sleep 1
          done
          echo "host failed to become ready"
          cat /tmp/host.log
          exit 1

      - name: Run host-internal audit-tamper test
        working-directory: examples/hosts/sqlite
        run: npm test

      - name: Full conformance suite (strict mode, no file parallelism)
        working-directory: conformance
        env:
          OPENWOP_BASE_URL: http://127.0.0.1:${{ env.OPENWOP_PORT }}
          OPENWOP_API_KEY: openwop-sqlite-dev-key
          OPENWOP_REQUIRE_BEHAVIOR: 'true'
          OPENWOP_OTEL_COLLECTOR: 'true'
          OPENWOP_OTEL_COLLECTOR_PORT: ${{ env.OPENWOP_OTEL_COLLECTOR_PORT }}
          # Profiles + capabilities the SQLite reference host honestly
          # does NOT claim per INTEROP-MATRIX.md (verified against the
          # host's `/.well-known/openwop` advertisement). Per
          # `conformance/src/lib/env.ts` §OPENWOP_OPTED_OUT_PROFILES,
          # listing them here flips strict-mode failure → PASS-by-opt-
          # out for the matching `behaviorGate(<name>, …)` call sites.
          # Distinguishes "host doesn't claim this surface" (good) from
          # "host claims but doesn't deliver" (bug). Without this, the
          # soak gate fails on every push even when no regression
          # occurred — the suite has more capability-gated scenarios
          # than this reference host claims.
          #
          # RFC 0027/0028/0029 `prompts-*` profiles (5 entries) — the
          # SQLite reference host has no prompts implementation
          # (`examples/hosts/sqlite/src/` ships audit/interrupts/
          # observability/server/webhooks only — no `promptStore.ts` or
          # `promptCompose.ts`). The reference workflow-engine host is
          # the only one that wires the RFC 0027/0028/0029 surface end-
          # to-end; SQLite honestly doesn't advertise it. Listed here so
          # strict-mode skip messages cite the right spec section
          # rather than firing a false-positive failure under
          # OPENWOP_REQUIRE_BEHAVIOR.
          OPENWOP_OPTED_OUT_PROFILES: 'openwop-production,openwop-auth-oauth2-client-credentials,openwop-auth-oidc-user-bearer,openwop-auth-mtls,openwop-replay-fork,workflowChainPacks,prompts-supported,prompts-endpoints,prompts-mutable,prompts-agent-bindings,prompts-observability-full'
          # Fixture-id opt-outs — the SQLite host auto-loads every
          # `conformance-*.json` fixture on disk (so the fixture IS
          # advertised in `/.well-known/openwop`) but does not implement
          # the underlying feature for the entries below:
          #   - conformance-dispatch-{input-mapping,output-mapping,
          #     cross-worker-handoff}*  → RFC 0022 §A / §D variable
          #     projection between parent and dispatched child runs is
          #     not implemented in the reference SQLite executor.
          #   - conformance-subworkflow-input-mapping*                  → RFC 0022 §B input
          #     seeding into a `core.subWorkflow` child is not
          #     implemented in the reference SQLite executor.
          #   - openwop-smoke-cost-emit                                 → the SQLite host loads
          #     the fixture workflow but doesn't implement the
          #     `conformance.cost.emit` fixture node, so runs terminate
          #     `failed` instead of `completed`. Cost-emission lives in
          #     the workflow-engine reference; SQLite hasn't picked up
          #     the G6 / O4 cost-attribution path.
          #   - conformance-model-capability-insufficient               → fixture references the
          #     `core.ai.*` node family with RFC 0031
          #     `requiredModelCapabilities` declarations. SQLite's
          #     executor doesn't register these node types so runs fail
          #     with `unsupported_node_type` rather than
          #     `capability_not_provided`. Model-capability gating
          #     lives in the workflow-engine reference.
          # Per `conformance/src/lib/fixtures.ts`, these ids are
          # subtracted from the advertised-fixture cache at suite init
          # so `isFixtureAdvertised(...)` skips the gated scenarios.
          # NOTE: `conformance-subworkflow-parent` stays advertised
          # because the non-OTel `subworkflow.test.ts` passes on SQLite;
          # the OTel-specific opt-out is below.
          OPENWOP_OPTED_OUT_FIXTURES: 'conformance-dispatch-input-mapping*,conformance-dispatch-output-mapping*,conformance-dispatch-cross-worker-handoff*,conformance-subworkflow-input-mapping*,openwop-smoke-cost-emit,conformance-model-capability-insufficient'
          # Scenario-id opt-outs — finer-grained than fixture or
          # profile opt-out. Used when the host correctly advertises
          # the prerequisite fixture + capability, but the specific
          # scenario depends on a feature the host doesn't implement:
          #   - otel-trace-propagation-subworkflow → SQLite advertises
          #     `conformance-subworkflow-parent` AND
          #     `capabilities.observability` (for audit-log integrity),
          #     but doesn't propagate `traceparent` across the
          #     `core.subWorkflow` dispatch boundary.
          # Per `conformance/src/lib/env.ts §isScenarioOptedOut`,
          # individual tests consult this set inside their skip
          # predicate.
          OPENWOP_OPTED_OUT_SCENARIOS: 'otel-trace-propagation-subworkflow'
          # OPENWOP_TEST_PUBLIC_REGISTRY deliberately NOT set here — it
          # would mix `packs.openwop.dev` reachability into the host
          # regression signal. Registry health is the next job's
          # responsibility.
        run: npx vitest run --no-file-parallelism

      - name: Multi-process scenarios (restart-during-run + staleClaim)
        working-directory: conformance
        env:
          OPENWOP_BASE_URL: http://127.0.0.1:${{ env.OPENWOP_PORT }}
          OPENWOP_API_KEY: openwop-sqlite-dev-key
          OPENWOP_RUN_RESTART_DURING_RUN: '1'
          OPENWOP_RUN_STALE_CLAIM: '1'
        run: |
          npx vitest run src/scenarios/restart-during-run.test.ts src/scenarios/staleClaim.test.ts

      - name: Three-language SDK smoke
        env:
          OPENWOP_BASE_URL: http://127.0.0.1:${{ env.OPENWOP_PORT }}
          OPENWOP_API_KEY: openwop-sqlite-dev-key
        run: bash sdk/smoke/all.sh

      - name: Tear down host
        if: always()
        run: |
          if [ -f /tmp/host.pid ]; then
            kill "$(cat /tmp/host.pid)" 2>/dev/null || true
          fi

      - name: Upload host log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openwop-host.log
          path: /tmp/host.log
          if-no-files-found: ignore

  registry-health:
    name: Public registry — packs.openwop.dev reachability + shape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Does NOT depend on host-conformance. A registry outage and a host
    # regression are independent failure signals.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: conformance/package-lock.json

      - name: Install conformance suite
        working-directory: conformance
        run: npm ci

      - name: Probe packs.openwop.dev discovery + index
        run: |
          set -euo pipefail
          # Standalone curl smoke so the failure-mode separation between
          # "registry unreachable" and "registry shape regressed" is
          # immediate in the GH log.
          curl -fsS https://packs.openwop.dev/.well-known/openwop-registry > /dev/null
          curl -fsS https://packs.openwop.dev/v1/index.json > /dev/null

      - name: Run registry-public conformance scenario
        working-directory: conformance
        env:
          # The scenario doesn't actually hit the OPENWOP_BASE_URL host
          # (it targets `packs.openwop.dev` directly via fetch). The
          # env vars are required by the suite's driver layer even
          # though no host is reached for this file.
          OPENWOP_BASE_URL: https://invalid.example
          OPENWOP_API_KEY: unused
          OPENWOP_TEST_PUBLIC_REGISTRY: 'true'
        run: npx vitest run src/scenarios/registry-public.test.ts
