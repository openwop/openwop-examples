name: Conformance Soak

# Two independent jobs:
#
#   host-conformance — the actual regression gate. Runs the FULL
#     conformance suite under strict mode against the SQLite reference
#     host. Multi-process scenarios (restart-during-run + staleClaim).
#     Three-language SDK smoke. **No external network dependencies** —
#     if `packs.openwop.dev` is down, this job still passes or fails on
#     host-only grounds, which is what a regression gate should do.
#
#   registry-health — separate concern: the hosted node-pack registry at
#     `packs.openwop.dev` is reachable and serves the documented shapes.
#     A registry outage fails THIS job in isolation; the host-conformance
#     job remains a clean signal about the SQLite host.
#
# Both jobs run on the nightly cron + on push to main + on
# workflow_dispatch. They don't depend on each other.

on:
  schedule:
    # 06:00 UTC nightly (off the European/US business-hours peaks).
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'examples/hosts/sqlite/**'
      - 'conformance/**'
      - '.github/workflows/conformance-soak.yml'

jobs:
  host-conformance:
    name: SQLite host — full conformance + multi-process + SDK smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            examples/hosts/sqlite/package-lock.json
            conformance/package-lock.json

      - name: Install SQLite reference host
        working-directory: examples/hosts/sqlite
        run: npm ci

      - name: Install conformance suite
        working-directory: conformance
        run: npm ci

      - name: Pre-allocate ports for host + OTel collector
        run: |
          echo "OPENWOP_PORT=3838" >> $GITHUB_ENV
          echo "OPENWOP_OTEL_COLLECTOR_PORT=14328" >> $GITHUB_ENV

      - name: Boot SQLite host (background)
        working-directory: examples/hosts/sqlite
        env:
          OPENWOP_PORT: ${{ env.OPENWOP_PORT }}
          OPENWOP_WEBHOOK_ALLOW_PRIVATE: 'true'
          OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:${{ env.OPENWOP_OTEL_COLLECTOR_PORT }}
          OPENWOP_OTEL_METRIC_INTERVAL_MS: '500'
          OPENWOP_CLAIM_TTL_MS: '2000'
          OPENWOP_HEARTBEAT_INTERVAL_MS: '500'
        run: |
          rm -rf data
          nohup npx tsx src/server.ts > /tmp/host.log 2>&1 &
          echo $! > /tmp/host.pid
          for i in {1..30}; do
            if curl -sf "http://127.0.0.1:${OPENWOP_PORT}/.well-known/openwop" > /dev/null; then
              echo "host ready"
              exit 0
            fi
            sleep 1
          done
          echo "host failed to become ready"
          cat /tmp/host.log
          exit 1

      - name: Run host-internal audit-tamper test
        working-directory: examples/hosts/sqlite
        run: npm test

      - name: Full conformance suite (strict mode, no file parallelism)
        working-directory: conformance
        env:
          OPENWOP_BASE_URL: http://127.0.0.1:${{ env.OPENWOP_PORT }}
          OPENWOP_API_KEY: openwop-sqlite-dev-key
          OPENWOP_REQUIRE_BEHAVIOR: 'true'
          OPENWOP_OTEL_COLLECTOR: 'true'
          OPENWOP_OTEL_COLLECTOR_PORT: ${{ env.OPENWOP_OTEL_COLLECTOR_PORT }}
          # OPENWOP_TEST_PUBLIC_REGISTRY deliberately NOT set here — it
          # would mix `packs.openwop.dev` reachability into the host
          # regression signal. Registry health is the next job's
          # responsibility.
        run: npx vitest run --no-file-parallelism

      - name: Multi-process scenarios (restart-during-run + staleClaim)
        working-directory: conformance
        env:
          OPENWOP_BASE_URL: http://127.0.0.1:${{ env.OPENWOP_PORT }}
          OPENWOP_API_KEY: openwop-sqlite-dev-key
          OPENWOP_RUN_RESTART_DURING_RUN: '1'
          OPENWOP_RUN_STALE_CLAIM: '1'
        run: |
          npx vitest run src/scenarios/restart-during-run.test.ts src/scenarios/staleClaim.test.ts

      - name: Three-language SDK smoke
        env:
          OPENWOP_BASE_URL: http://127.0.0.1:${{ env.OPENWOP_PORT }}
          OPENWOP_API_KEY: openwop-sqlite-dev-key
        run: bash sdk/smoke/all.sh

      - name: Tear down host
        if: always()
        run: |
          if [ -f /tmp/host.pid ]; then
            kill "$(cat /tmp/host.pid)" 2>/dev/null || true
          fi

      - name: Upload host log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openwop-host.log
          path: /tmp/host.log
          if-no-files-found: ignore

  registry-health:
    name: Public registry — packs.openwop.dev reachability + shape
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Does NOT depend on host-conformance. A registry outage and a host
    # regression are independent failure signals.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: conformance/package-lock.json

      - name: Install conformance suite
        working-directory: conformance
        run: npm ci

      - name: Probe packs.openwop.dev discovery + index
        run: |
          set -euo pipefail
          # Standalone curl smoke so the failure-mode separation between
          # "registry unreachable" and "registry shape regressed" is
          # immediate in the GH log.
          curl -fsS https://packs.openwop.dev/.well-known/openwop-registry > /dev/null
          curl -fsS https://packs.openwop.dev/v1/index.json > /dev/null

      - name: Run registry-public conformance scenario
        working-directory: conformance
        env:
          # The scenario doesn't actually hit the OPENWOP_BASE_URL host
          # (it targets `packs.openwop.dev` directly via fetch). The
          # env vars are required by the suite's driver layer even
          # though no host is reached for this file.
          OPENWOP_BASE_URL: https://invalid.example
          OPENWOP_API_KEY: unused
          OPENWOP_TEST_PUBLIC_REGISTRY: 'true'
        run: npx vitest run src/scenarios/registry-public.test.ts
