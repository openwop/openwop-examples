name: Examples CI

# Single matrix with per-example `host:` field — no parallel matrix
# blocks. Adding an example: drop a new dir under examples/<name>/
# with package.json having `npm test` defined, then add a row below.
#
# Host targets:
#   - in-memory  — CI starts the in-memory reference host first.
#   - external   — CI runs only when OPENWOP_EXTERNAL_BASE_URL and
#                  OPENWOP_EXTERNAL_API_KEY secrets are set.
#                  Otherwise the example exits 0 with a skip-equivalent message.
#   - dry-run    — example needs no host; runs unconditionally.
#
# External-host examples MUST use Idempotency-Key in their HTTP
# requests so CI re-runs collapse to a single run server-side
# and MUST exit 0 with a clear skip-equivalent message when their target
# env vars are unset.

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/examples.yml'
      - 'scripts/check-example-pack-refs.mjs'
  # PRs trigger WITHOUT a workflow-level path filter so the required `gate`
  # job always reports a check (a path-filtered workflow that never runs leaves
  # a required check "expected" forever and deadlocks the merge). Relevance is
  # instead computed per-job in `changes`, so the heavy matrix still stays lean
  # on PRs that don't touch examples.
  pull_request:
    branches: [main]

jobs:
  # Detect whether this PR touches example-relevant paths. The real jobs gate on
  # this so a docs/registry-only PR skips the matrix, while the always-run `gate`
  # job below still reports a (passing) required check.
  changes:
    name: Detect example-relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            # Non-PR (push) events keep the workflow-level path filter, so a run
            # here is already example-relevant.
            echo "relevant=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
               | grep -qE '^(examples/|\.github/workflows/examples\.yml$|scripts/check-example-pack-refs\.mjs$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  validate-workflow-defs:
    name: Validate workflow-definition pack references
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # Workflow-definition examples (market-intel-pipeline, ads-publish-pipeline,
    # rag-grounded-chat) declare their pack dependencies in metadata.packs[].
    # This gate catches drift if a referenced pack is yanked or its version is
    # no longer published. Resolves against the live registry at packs.openwop.dev
    # (the registry catalog lives in the openwop-registry repo; spec-prose pack
    # claims are checked separately in the openwop spec repo).
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Validate metadata.packs[] references resolve
        run: node scripts/check-example-pack-refs.mjs --registry https://packs.openwop.dev

  examples:
    name: examples (${{ matrix.example.name }})
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          # In-memory-targeting — CI starts the reference host.
          - { name: tiny-workflow,         host: in-memory }
          - { name: streaming-client,      host: in-memory }
          - { name: idempotent-runs,       host: in-memory }
          # External-host targeting — skip-equivalent without secrets.
          - { name: approval-workflow,     host: external }
          - { name: branch-fork,           host: external }
          - { name: mcp-tool,              host: external }
          # Dry-run — no host needed.
          - { name: node-pack-publishing,  host: dry-run }
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Detect whether external-host secrets are available. External-host
      # examples skip cleanly when the operator hasn't configured the
      # OPENWOP_EXTERNAL_* secrets (e.g., forks, public branches).
      - name: Resolve external-host availability
        id: external
        env:
          EXT_URL: ${{ secrets.OPENWOP_EXTERNAL_BASE_URL }}
        run: |
          if [ "${{ matrix.example.host }}" = "external" ] && [ -z "$EXT_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.example.name }} — OPENWOP_EXTERNAL_BASE_URL not configured."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # In-memory host setup — only when host == in-memory
      - name: Install in-memory host
        if: matrix.example.host == 'in-memory'
        working-directory: examples/hosts/in-memory
        run: npm install

      - name: Start in-memory host
        if: matrix.example.host == 'in-memory'
        working-directory: examples/hosts/in-memory
        run: |
          npm start > /tmp/openwop-host.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3737/.well-known/openwop > /dev/null; then
              echo "host ready"; exit 0
            fi
            sleep 1
          done
          echo "host failed to start" >&2
          cat /tmp/openwop-host.log >&2
          exit 1

      # Common: install + run the example.
      - name: Install example deps
        if: steps.external.outputs.skip != 'true'
        working-directory: examples/${{ matrix.example.name }}
        run: npm install --silent

      - name: Run example
        if: steps.external.outputs.skip != 'true'
        working-directory: examples/${{ matrix.example.name }}
        env:
          # Three host modes:
          #   - in-memory: target the local reference host started above (localhost:3737)
          #   - external:  use the operator-provided secrets; when secrets are unset,
          #                leave empty so the example's `if (!BASE_URL) skip()` branch fires
          #   - dry-run:   no env vars needed (the example ignores them)
          # The previous expression collapsed `external + missing secrets` to localhost,
          # which defeated each example's skip-equivalent contract; now external-with-
          # empty-secret falls through to '' and the example exits 0 cleanly.
          OPENWOP_BASE_URL: ${{ matrix.example.host == 'in-memory' && 'http://127.0.0.1:3737' || (matrix.example.host == 'external' && secrets.OPENWOP_EXTERNAL_BASE_URL) || '' }}
          OPENWOP_API_KEY: ${{ matrix.example.host == 'in-memory' && 'openwop-inmem-dev-key' || (matrix.example.host == 'external' && secrets.OPENWOP_EXTERNAL_API_KEY) || '' }}
        run: npm test
        timeout-minutes: 2

      - name: Show host log on failure
        if: failure() && matrix.example.host == 'in-memory'
        run: cat /tmp/openwop-host.log

  # Single, always-run required check. Aggregates the (possibly-skipped) real
  # jobs so branch protection has one stable context to require with
  # `strict: true` — a docs-only PR skips the matrix and this still passes; an
  # example-touching PR fails the gate iff a real job failed. Requiring this
  # (not the 7 matrix legs) also keeps the required-check list stable when
  # examples are added or removed.
  gate:
    name: Examples gate
    needs: [changes, validate-workflow-defs, examples]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        env:
          VALIDATE_RESULT: ${{ needs.validate-workflow-defs.result }}
          EXAMPLES_RESULT: ${{ needs.examples.result }}
        run: |
          echo "validate-workflow-defs=$VALIDATE_RESULT  examples=$EXAMPLES_RESULT"
          # 'success' and 'skipped' are OK; 'failure'/'cancelled' fail the gate.
          for r in "$VALIDATE_RESULT" "$EXAMPLES_RESULT"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required examples job did not succeed ($r)."
              exit 1
            fi
          done
          echo "Examples gate OK."
